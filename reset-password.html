<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .contenedor {
      width: 100%;
      max-width: 520px;
      margin: 40px auto;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      margin-top: 16px;
      border-radius: 12px;
      border: 1px solid #334155;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      margin-top: 8px;
    }

    input {
      background: #fff;
      color: #111827;
    }

    button {
      background: #e5e7eb;
      color: #111827;
      cursor: pointer;
      font-weight: bold;
    }

    .titulo-seccion {
      margin-bottom: 10px;
      color: #93c5fd;
    }

    .respuesta-box {
      background: #0f172a;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 12px;
    }

    .input-password-wrap{
      position: relative;
      display: block;
      width: 100%;
    }

    .input-password-wrap input{
      width: 100%;
      box-sizing: border-box;
      padding-right: 32px !important;
    }

    .input-password-wrap .btn-ver-password{
      all: unset;
      position: absolute !important;
      top: 50% !important;
      right: 8px !important;
      transform: translateY(-50%) !important;
      width: 16px !important;
      height: 16px !important;
      min-width: 16px !important;
      max-width: 16px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      cursor: pointer !important;
      font-size: 12px !important;
      line-height: 1 !important;
      z-index: 3 !important;
      opacity: .9;
    }

    .input-password-wrap .btn-ver-password:hover{
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="card">
      <h2 class="titulo-seccion">Restablecer contraseña</h2>

      <label for="nuevaPassword">Nueva contraseña</label>
      <div class="input-password-wrap">
        <input
          id="nuevaPassword"
          type="password"
          placeholder="Escribe tu nueva contraseña"
          autocomplete="new-password"
        />
        <button
          type="button"
          class="btn-ver-password"
          id="btnVerNuevaPassword"
          onclick="togglePassword('nuevaPassword','btnVerNuevaPassword')"
          aria-label="Mostrar contraseña"
          title="Mostrar contraseña"
        >
          👁️
        </button>
      </div>

      <label for="confirmarNuevaPassword">Confirmar nueva contraseña</label>
      <div class="input-password-wrap">
        <input
          id="confirmarNuevaPassword"
          type="password"
          placeholder="Confirma tu nueva contraseña"
          autocomplete="new-password"
        />
        <button
          type="button"
          class="btn-ver-password"
          id="btnVerConfirmarNuevaPassword"
          onclick="togglePassword('confirmarNuevaPassword','btnVerConfirmarNuevaPassword')"
          aria-label="Mostrar contraseña"
          title="Mostrar contraseña"
        >
          👁️
        </button>
      </div>

      <button type="button" onclick="guardarNuevaPassword()">Guardar nueva contraseña</button>

      <div id="respuesta" class="respuesta-box">Esperando acción...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      "https://hybozykbfehfjldhaxpp.supabase.co",
      "TU_ANON_KEY_AQUI"
    );

    function porId(id) { return document.getElementById(id); }

    function mostrarRespuesta(texto) {
      const el = porId("respuesta");
      if (el) el.textContent = texto;
    }

    function togglePassword(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn = document.getElementById(btnId);

      if (!input) return;

      const mostrando = input.type === "text";
      input.type = mostrando ? "password" : "text";

      if (btn) {
        btn.textContent = mostrando ? "👁️" : "🙈";
        btn.setAttribute(
          "aria-label",
          mostrando ? "Mostrar contraseña" : "Ocultar contraseña"
        );
        btn.setAttribute(
          "title",
          mostrando ? "Mostrar contraseña" : "Ocultar contraseña"
        );
      }
    }

    async function guardarNuevaPassword() {
      try {
        const nueva = porId("nuevaPassword")?.value?.trim() || "";
        const confirmar = porId("confirmarNuevaPassword")?.value?.trim() || "";

        if (!nueva || !confirmar) {
          mostrarRespuesta("Completa ambos campos.");
          return;
        }

        if (nueva !== confirmar) {
          mostrarRespuesta("Las contraseñas no coinciden.");
          return;
        }

        if (nueva.length < 6) {
          mostrarRespuesta("La contraseña debe tener al menos 6 caracteres.");
          return;
        }

        const { error } = await supabaseClient.auth.updateUser({
          password: nueva
        });

        if (error) {
          mostrarRespuesta("Error: " + error.message);
          return;
        }

        mostrarRespuesta("Contraseña actualizada correctamente. Ya puedes volver a iniciar sesión.");
      } catch (err) {
        console.error("❌ Error en guardarNuevaPassword():", err);
        mostrarRespuesta("Error inesperado al actualizar la contraseña.");
      }
    }
  </script>
</body>
</html>
